<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Мировые новости с мгновенным переводом на русский язык">
    <meta name="theme-color" content="#007AFF">
    <title>Новостной Агрегатор</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>
                </div>
                <h1 class="brand-title">Новостной Агрегатор</h1>
            </div>
            
            <div class="header-actions">
                <button type="button" id="theme-toggle-btn" class="icon-btn" title="Сменить тему" aria-label="Сменить тему">
                    <svg class="theme-icon-sun d-none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
                    <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <!-- Sticky Search Bar -->
        <section class="sticky-search-section">
            <form id="search-form" class="search-form">
                <div class="search-inputs-row">
                    <div class="field-group field-source">
                        <select class="form-select" id="source-select">
                            <option value="" selected>Все источники</option>
                            <optgroup label="Главные новости">
                                <option value="bbc">BBC News</option>
                                <option value="nyt">The New York Times</option>
                                <option value="guardian">The Guardian</option>
                                <option value="cnn">CNN</option>
                                <option value="aljazeera">Al Jazeera</option>
                                <option value="npr">NPR</option>
                                <option value="reuters_world">Reuters</option>
                            </optgroup>
                            <optgroup label="Технологии">
                                <option value="techcrunch">TechCrunch</option>
                                <option value="verge">The Verge</option>
                                <option value="wired">WIRED</option>
                                <option value="engadget">Engadget</option>
                                <option value="arstechnica">Ars Technica</option>
                                <option value="hackernews">Hacker News</option>
                                <option value="bbc_tech">BBC Tech</option>
                                <option value="nyt_tech">NYT Tech</option>
                                <option value="bloomberg_tech">Bloomberg Tech</option>
                            </optgroup>
                            <optgroup label="Бизнес">
                                <option value="forbes">Forbes</option>
                                <option value="bbc_business">BBC Business</option>
                                <option value="axios">Axios</option>
                            </optgroup>
                            <optgroup label="Мир">
                                <option value="nyt_world">NYT World</option>
                                <option value="reddit_news">Reddit World News</option>
                                <option value="politico">Politico</option>
                            </optgroup>
                            <optgroup label="Наука">
                                <option value="sciencedaily">Science Daily</option>
                                <option value="nature">Nature</option>
                                <option value="phys">Phys.org</option>
                                <option value="space">Space.com</option>
                            </optgroup>
                            <optgroup label="Культура">
                                <option value="atlantic">The Atlantic</option>
                                <option value="newyorker">The New Yorker</option>
                            </optgroup>
                            <optgroup label="Спорт">
                                <option value="espn">ESPN</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="field-group field-query">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" class="form-control" id="topic-input" placeholder="Поиск новостей... (нажмите /)" autocomplete="off" spellcheck="false">
                        </div>
                    </div>

                    <div class="field-group field-buttons">
                        <button class="btn-primary" id="search-button" type="submit">Найти</button>
                        <button class="btn-secondary" id="refresh-button" type="button" title="Обновить выдачу">↻</button>
                    </div>
                </div>

                <div class="search-toggles-bar">
                    <div class="toggles-group">
                        <label class="toggle-pill">
                            <input type="checkbox" id="translate-toggle" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-text">Перевод</span>
                        </label>
                        <label class="toggle-pill">
                            <input type="checkbox" id="view-all-toggle">
                            <span class="toggle-slider"></span>
                            <span class="toggle-text">Все материалы</span>
                        </label>
                    </div>

                    <div class="quick-chips-scroll" aria-label="Быстрые темы">
                        <button type="button" class="chip-btn" data-quick-topic="Израиль">Израиль</button>
                        <button type="button" class="chip-btn" data-quick-topic="Украина">Украина</button>
                        <button type="button" class="chip-btn" data-quick-topic="Экономика">Экономика</button>
                        <button type="button" class="chip-btn" data-quick-topic="Технологии">Технологии</button>
                        <button type="button" class="chip-btn" data-quick-topic="ИИ">ИИ</button>
                        <button type="button" class="chip-btn" data-quick-topic="Наука">Наука</button>
                        <button type="button" class="chip-btn" data-quick-topic="Спорт">Спорт</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- Secondary collapsible tools -->
        <section class="panels-container">
            <details class="collapsible-panel" id="saved-searches-panel">
                <summary class="panel-summary">
                    <span class="summary-title">★ Сохранённые поиски</span>
                    <button type="button" class="btn-sm" id="save-search-button">Сохранить этот поиск</button>
                </summary>
                <div class="panel-content">
                    <div id="saved-searches-list" class="saved-searches-grid" aria-live="polite"></div>
                </div>
            </details>

            <details class="collapsible-panel" id="favorites-panel">
                <summary class="panel-summary">
                    <span class="summary-title">🔖 Избранное (<span id="favorites-count">0</span>)</span>
                </summary>
                <div class="panel-content">
                    <div id="favorites-list" class="favorites-grid" aria-live="polite"></div>
                </div>
            </details>
        </section>

        <!-- Feed section -->
        <section class="news-feed-section">
            <div class="feed-header-bar">
                <div class="category-tabs" role="tablist" aria-label="Категории новостей">
                    <button type="button" class="category-tab active" role="tab" aria-selected="true" data-category="all">Все</button>
                    <button type="button" class="category-tab" role="tab" aria-selected="false" data-category="tech">Технологии</button>
                    <button type="button" class="category-tab" role="tab" aria-selected="false" data-category="business">Бизнес</button>
                    <button type="button" class="category-tab" role="tab" aria-selected="false" data-category="world">Мир</button>
                    <button type="button" class="category-tab" role="tab" aria-selected="false" data-category="science">Наука</button>
                    <button type="button" class="category-tab" role="tab" aria-selected="false" data-category="culture">Культура</button>
                    <button type="button" class="category-tab" role="tab" aria-selected="false" data-category="sports">Спорт</button>
                </div>

                <div class="layout-controls">
                    <button type="button" id="stats-toggle-btn" class="icon-btn" title="Аналитика трендов" aria-label="Аналитика">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    </button>
                    <div class="view-switch-toggle">
                        <button type="button" id="layout-grid-btn" class="layout-btn active" title="Вид сеткой" aria-label="Сетка">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        </button>
                        <button type="button" id="layout-list-btn" class="layout-btn" title="Вид списком" aria-label="Список">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats Analytics Panel -->
            <div id="stats-dashboard" class="stats-dashboard d-none">
                <div class="stats-header">
                    <span class="stats-title">Аналитика новостного потока</span>
                    <button type="button" class="close-btn" id="stats-close-btn">&times;</button>
                </div>
                <div class="stats-grid">
                    <div class="stats-card">
                        <p class="stats-card-label">Топ ключевых слов</p>
                        <div id="stats-keywords" class="stats-keywords-list"></div>
                    </div>
                    <div class="stats-card">
                        <p class="stats-card-label">Распределение по источникам</p>
                        <div id="stats-sources" class="stats-sources-list"></div>
                    </div>
                </div>
            </div>

            <div id="search-feedback" class="search-feedback" role="status" aria-live="polite"></div>
            
            <div id="loading-indicator" class="loading-bar d-none" aria-live="polite">
                <div class="progress-line"></div>
            </div>

            <div id="news-container" class="news-grid">
                <!-- News items will be injected here -->
            </div>
        </section>

        <footer class="app-footer">
            <p>Источники: BBC, Al Jazeera, The Guardian, CNN, NPR, Reuters, TechCrunch, The Verge, Forbes и другие</p>
        </footer>
    </main>

    <!-- Native HTML Dialog Modal for full news article -->
    <dialog class="article-modal" id="news-modal">
        <div class="modal-card">
            <header class="modal-header">
                <h3 class="modal-title" id="news-modal-label">Загрузка новости...</h3>
                <button type="button" class="modal-close-btn" id="news-modal-close" aria-label="Закрыть">&times;</button>
            </header>
            <div class="modal-body" id="news-modal-body">
                <!-- Content will be injected here -->
            </div>
        </div>
    </dialog>

    <script src="js/main.js" defer></script>
</body>
</html>
